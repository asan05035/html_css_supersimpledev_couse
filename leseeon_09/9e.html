<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .dp{
      width:25px;
      height:25px;
      border-radius:50%;
      object-fit: cover;
    }

    .container{
      display: flex;
      align-items:center;
      border:1px solid #cfd9de;
      border-radius: 22px;
      padding:10px;
      width:350px;
    }

    input{
      flex:1;
      margin:0 10px;
      font-size:16px;
      outline:none;
      border:none;
    }

    button{
      padding:5px 16px ;
      border-radius:25px;
      border:none;
      color:white;
      background-color: rgb(0, 183, 255);
      font-weight: bolder;
    }
  </style>
</head>
<body>
  <div class="container">
  <img class='dp' src="/image/thumbnails/alvan-nee-ZCHj_2lJP00-unsplash.jpg">
  <input type="text" placeholder="Whast's happening?">
  <button>tweet</button>
  </div>
</body>
</html>
