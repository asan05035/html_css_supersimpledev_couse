<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .get_started_button{
      background-color: #7952b3;
      border:none;
      border-radius: 5px;
      color:#FFFFFF;
      font-weight: bold;
      height: 38px;
      width:110px;
      cursor:pointer;
      transition: background-color 0.2s ease-in-out;
      margin-right: 5px;
    }

    .get_started_button:hover{

      background-color: #683bac;
    }

    .download_button{
      background-color: #FFFFFF;
      color: #683bac;
      border-color: #683bac;
      border-style: solid;
      border-radius: 5px;
      font-weight: bold;
      height:38px;
      width:110px;
      cursor:pointer;
      transition: all 0.2s ease-in-out;

    }

    .download_button:hover{
      background-color: grey;
      color:white;
      border:none;
      opacity:0.9;
    }
  </style>
  <button class="get_started_button">
    Get started
  </button>
  <button class="download_button">
    Download
  </button>
</body>
</html>
