<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .Amazon_button{
      background-color: rgb(255, 216, 20);
      border:none;
      border-radius: 25px;
      height: 38px;
      width: 120px;
      cursor:pointer;
      font-weight: bold;
      transition: background-color 0.2s ease-in-out;
    }

    .Amazon_button:hover{
      background-color: rgb(227, 190, 2);
    }
  </style>

  <button class="Amazon_button">
    Add to Cart
  </button>
</body>
</html>
