<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .homepage{
      color:rgb(0, 113, 113);
      transition: color 0.2s ease-in-out;
    }

    .homepage:hover{
      color:rgba(0, 113, 113, 0.7);
    }

    .product_name{
      font-weight: bold;
      font-size: larger;

    }

    .product_price{
      color:rgb(0, 118, 0);
      font-weight: bold;
    }

    .add_button{
      background-color:rgb(255, 216, 20) ;
      /* font-weight: bold; */
      border:none;
      border-radius:10px;
      height: 38px;
      width:120px;
      cursor:pointer;
      transition: all 0.2s;

    }

    .add_button:hover{
      background-color: rgb(213, 181, 22);
    }

    .buy_button{
      background-color: rgb(255, 164, 28);
      border:none;
      border-radius: 10px;

      height:38px;
      width:100px;
      cursor:pointer;
      margin-left: 8px;

    }

    .buy_button:active{
      background-color: rgb(208, 125, 0);

    }
  </style>
  <a href="https://www.amazon.in" target="_blank" class="homepage">Back to Amazon</a>
  <p class="product_name">Nike Black Running Shoes</p>
  <p class="product_price">$39 - in Stock.</p>
  <p>Free Delivery tommorow</p>
  <button class="add_button">Add to Cart</button>
  <button class="buy_button">Buy now</button>
</body>
</html>
