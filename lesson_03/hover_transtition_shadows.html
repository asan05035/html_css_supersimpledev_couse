<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .subscribe_button{
      background-color: rgb(232, 14, 14);
      color: rgba(255, 255, 255, 0.96);
      border: none;
      border-radius: 25px;
      height:38px;
      width: 130px;
      cursor: pointer;
      transition: opacity 1s;
    }
    .subscribe_button:hover{
      opacity:0.8;

    }

    .subscribe_button:active{
      opacity:0.4;
    }
  
    .join_button{
      background-color: white;
      border-style: solid;
      border-color: #0A66C2;
      border-radius: 25px;
      color:#0A66C2;
      height:38px;
      width:75px;
      /* font-weight: bold; */
      cursor:pointer;
      transition: background-color 0.2s ease-in-out, color 0.2s ease-in;
      margin-left: 8px;
    }

    .join_button:hover{
      background-color: #0A66C2;
      color:#FFFFFF;

    }

    .join_button:active{
      opacity:0.8;
    }
    
    .tweet_button{
      background-color: #1DA1F2;
      color:#FFFFFF;
      border:none;
      /* border-color: #1DA1F2; */
      border-radius: 25px;
      height:38px;
      width:80px;
      font-weight: bold;
      cursor:pointer;
      /* box-shadow: 0 0 0 black; */
      transition: box-shadow 0.2s ease-in-out;

    }

    .tweet_button:hover{
      box-shadow:0 3px 6px rgba(0, 0, 0, 0.5);

    }
  </style>

  <button class="subscribe_button">
    SUBSCRIBE
  </button>

  <button class="join_button">
    JOIN
  </button>

  <button class="tweet_button">
    Tweet
  </button>
  

</body>
</html>
