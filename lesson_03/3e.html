<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .apply_button{
      background-color: rgb(10, 102, 194);
      border:none;
      border-radius: 20px;
      color:white;
      font-weight: bold;
      height:40px;
      width:220px;
      cursor:pointer;
      margin-right: 8px;
      transition: background-color 0.2s ease-in-out;
    }

    .apply_button:hover{
      background-color: rgb(7, 84, 160);
    }

    .save_button{
      background-color: white;
      color: rgb(10, 102, 194);
      border-color:rgb(10, 102, 194);
      border-style:solid;
      border-width:1.5px;
      height: 40px;
      width:80px;
      font-weight: bold;
      border-radius: 20px;
      cursor:pointer;
      transition: all 0.1s ease-in-out;
    }

    .save_button:hover{
      background-color:rgba(10, 102, 194, 0.2);
      border-width:2px;
    }
  </style>
  <button class="apply_button">
    Apply on company website
  </button>
  <button class="save_button">
    Save
  </button>
</body>
</html>
