<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <style>

    p{
      font-family: Montserrat;
      margin-bottom: 0px;
      margin-top: 0px;
    }
    .email_title{
      
      margin-bottom:5px;
    }

    .email_textbox{
      font-family: Montserrat;
      width:300px;
      margin-top:5px;
      padding-top:5px;
      padding-bottom:5px;
      border:solid;
      border-color: rgb(130, 130, 130);
      border-radius:5px;
    }
    
    .privacy{
      margin-top: 10px;
      font-size: 10px;
    }

    .button{
      background-color: rgb(12, 106, 194);
      color:white;
      border:none;
      border-radius: 25px;
      text-align: center;
      margin-top: 10px;
      padding-left:100px;
      padding-right:130px;
      padding-top:8px;
      padding-bottom:8px;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <p class="email_title">Email</p>
  <input class='email_textbox'type="text">
  <p class="privacy">By clicking Agree & Join, you agree to the Privacy Policy</p>
  <button class="button">Agree & Join</button>
</body>
</html>
