<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    p{
      font-family: Arial, Helvetica, sans-serif;
      margin-top:0px;
      margin-bottom: 0px;
    }
    .title{
      font-weight: bold;
      font-size: 28px;
      text-align: center;

    }
    .subtitle{
      font-weight: lighter;
      text-align: center;
      margin-top: 10px;
      margin-bottom:15px;
    }

    .button{
      text-align: center;
      color:rgb(0, 123, 255);
      cursor: pointer;
    }

    .button:hover{
      text-decoration: underline;
    }
  </style>
  <p class="title">Shopping for business?</p>
  <p class="subtitle">See how Apple at work can help</p>
  <p class="button">Learn more &#x3E;</p>
</body>

</html>
