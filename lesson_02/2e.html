<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .Apply_button{
      background-color: rgb(10, 102, 194);
      color:rgb(255, 255, 255);
      border:none;
      border-radius:25px;
      width:220px;
      height:40px;
      font-weight:bold;
      cursor:pointer;
      margin-right:8px;
    }

    .Save_button{
      background-color: white;
      color:rgb(10, 102, 194);
      border-color:rgb(10, 102, 194);
      border-style:solid;
      border-radius: 25px;
      width:70px;
      height:40px;
      font-weight: bold;
      cursor:pointer;

    }

  </style>
  <button class="Apply_button">Apply on company website</button>
  <button class="Save_button">Save</button>
</body>
</html>
