<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  .homepage{
    color:rgb(0,113,133);

  }

  .product_name{
    font-weight: bold;
    font-size: larger;
  }

  .product_price{
    color:rgb(0,118,0);
    font-weight:bold;
  }
  .Add_to_cart_button{
    background-color: rgb(255, 216, 20);
    border:none;
    border-radius: 25px;
    height: 38px;
    width: 120px;
    font-weight:600;
    cursor:pointer;
    margin-right: 8px;
  }
  .Buy_now_button{
    background-color: rgb(255, 164, 28);
    border:none;
    border-radius: 25px;
    height:38px;
    width:100px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
<body>
  <a href="https://www.amazon.in/" target="_blank" class="homepage">Back to Amazon</a>
  <p class="product_name">Nike Black Running Shoes</p>
  <p class="product_price">$39 - in stock</p>
  <p>Free delivery tomorrow</p>
  <button class="Add_to_cart_button">Add to Cart</button>
  <button class="Buy_now_button">Buy now</button>

</body>
</html>
