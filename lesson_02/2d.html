<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .Get_started_button{
      background-color: #7952b3;
      color:rgb(255, 255, 255);
      border:none;
      border-radius:4px;
      width:110px;
      height:38px;
      font-weight: bold;
      cursor:pointer;
    }

    .Download_button{
      background-color: rgb(255, 255, 255);
      color:#7952b3;
      border-radius:4px;
      border-color: #7952b3;
      border-style: solid;
      font-weight:bold;
      width:110px;
      height:38px;
      cursor:pointer;
      margin-left:8px;
    }
    
  </style>
  <button class="Get_started_button">
    Get Started
  </button>
  <button class="Download_button">
    Download
  </button>
</body>
</html>
