<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .subscribe-button{
      background-color: rgb(200, 0, 0);
      color:white;
      border: none;
      height: 36px;
      width:105px;
      border-radius:5px;
      cursor:pointer;
      margin-right:8px;
    }
    .join-button{
      background-color:rgb(255, 255, 255);
      color:rgb(1, 129, 249);
      height:36px;
      border-radius:8px;
      border-color:rgb(1, 129, 249);
      border-style:solid;
      border-width:1px;
      width:70px;
      cursor:pointer;
      margin-right:8px;

    }
    
    .tweet-button{
      background-color:rgb(0, 166, 255);
      color:white;
      border-radius:35px;
      border:none;
      height:45px;
      width:100px;
      cursor:pointer;
      font-weight:bold;
      font-size:15px;
      margin-left:8px;
    }
  </style>
  <button class="subscribe-button">SUBSCRIBE</button>
  <button class="join-button">
    JOIN
  </button>
  <button class="tweet-button">
    Tweet
  </button>
</body>
</html>
