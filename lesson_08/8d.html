<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  input{
    border-width:1px;
    border-style:solid;
    padding:8px 12px 8px 12px;
    border-radius:8px;
    font-size:12px;
    margin-bottom:12px;
  }
  .firstname{
    width:148px;
  }

  .lastname{
    width:148px;
  }
  .email{
    display:block;
    width:325px;
    
  }
  .signup{
    margin-top: 10px;
    display:block;
    background-color: rgb(26, 131, 251);
    color:white;
    font-weight:bold;
    border:none;
    border-radius:15px;
    padding:10px 90px;
  }
</style>
<body>
  <input type="text" class="firstname" placeholder="First Name">
  <input type="text" class="lastname" placeholder="Last Name">
  <input type="text" class="email" placeholder="Email">
  <button class="signup">Sign up</button>
</body>
</html>
