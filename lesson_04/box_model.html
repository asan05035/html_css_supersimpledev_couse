<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .stretch_button{
      background-color:green;
      border:none;
      padding-left: 16px;
      padding-right: 16px;
      padding-top: 10px;
      padding-bottom:10px;
      cursor: pointer;
      font-weight:bold;
      color:white;
      transition: all 0.2s ease-in-out;
    }

    .stretch_button:hover{
      padding-left:30px;
      padding-bottom:16px;
      padding-top:16px;
      padding-right: 30px;
    }
  </style>
  <button class="stretch_button">
    stretch
  </button>
</body>
</html>
